<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portal Tuiutech</title>
    
    <!-- Fonte Roboto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Link para o CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="pagina-login">

    <!-- Caixa central de Login -->
    <div class="login-container">
        <div class="login-box">
            
            <!-- Logo centralizada -->
            <img src="Syle.png" alt="Logo Syle" class="logo-login">
            
            <h2>Entrar no Portal</h2>
            <p class="login-subtitulo">Acesso exclusivo para a equipe Tuiutech</p>

            <!-- Formulário -->
            <form id="formLogin">
                <div class="grupo-input">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" class="input-login" placeholder="Ex: joao@tuiutech.com" required>
                </div>

                <div class="grupo-input">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" class="input-login" placeholder="Sua senha secreta" required>
                </div>

                <!-- Botão de Entrar -->
                <button type="submit" class="btn-primario btn-login">Entrar na Conta</button>
            </form>

            <div class="login-rodape">
                <a href="#">Esqueceu a senha?</a>
            </div>
            
        </div>
    </div>

    <!-- Link para o JavaScript -->
    <script src="script.js"></script>
</body>
</html>
