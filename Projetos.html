<body>
    
    <header class="Cabecario">
        <a href="index.html" class="logo-link">
            <img src="Syle.png" alt="Logo Syle" class="logo-img">

        <div class="menu-container">

                <ul>

    <main class="kanban-container">
        
        <div class="acoes-globais">
            <button class="btn-secundario" id="btn-novo-quadro">+ Criar Novo Quadro</button>
        </div>

        <div id="todos-os-quadros">
            
            <!-- Primeiro Quadro Padrão -->
            <div class="quadro-wrapper">
                <div class="kanban-cabecalho">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <h2 class="titulo-quadro">Quadro de Engenharia - Temporada 2026</h2>
                        <button class="btn-apagar-quadro" title="Apagar Quadro">🗑️</button>
                    </div>
                    <button class="btn-primario btn-nova-tarefa">+ Nova Tarefa</button>
                </div>

                <div class="kanban-board">
                    <div class="kanban-coluna">
                        <div class="coluna-cabecalho">
                            <h3> A Fazer</h3>
                            <span class="contador-tarefas">2</span>
                        </div>
                        <div class="kanban-cartoes">
                            <div class="kanban-cartao">
                                <p class="cartao-titulo">Cortar perfis de alumínio</p>
                                <div class="cartao-rodape"><span class="cartao-data">10 Mai</span></div>
                            </div>
                            <div class="kanban-cartao">
                                <p class="cartao-titulo">Configurar controle do Xbox</p>
                                <div class="cartao-rodape"><span class="cartao-data">12 Mai</span></div>
                            </div>
                        </div>
                        <button class="btn-add-cartao">+ Adicionar um cartão</button>
                    </div>
                    
                    <div class="kanban-coluna">
                        <div class="coluna-cabecalho">
                            <h3>Fazendo</h3>
                            <span class="contador-tarefas">1</span>
                        </div>
                        <div class="kanban-cartoes">
                            <div class="kanban-cartao">
                                <p class="cartao-titulo">Montar caixa de redução</p>
                                <div class="cartao-rodape">
                                    <span class="cartao-data">Hoje</span>
                                    <div class="perfil-btn miniatura">JF</div>
                                </div>
                            </div>
                        </div>
                        <button class="btn-add-cartao">+ Adicionar um cartão</button>
                    </div>
                    
                    <div class="kanban-coluna">
                        <div class="coluna-cabecalho">
                            <h3>Concluído</h3>
                            <span class="contador-tarefas">0</span>
                        </div>
                        <div class="kanban-cartoes"></div>
                        <button class="btn-add-cartao">+ Adicionar um cartão</button>
                    </div>
                </div>
